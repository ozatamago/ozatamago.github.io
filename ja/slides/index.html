<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="canonical" href="https://ozatamago.github.io/ja/slides/" />
  <link rel="alternate" hreflang="en" href="https://ozatamago.github.io/slides/" />
  <link rel="alternate" hreflang="ja" href="https://ozatamago.github.io/ja/slides/" />
  <link rel="stylesheet" href="/assets/styles.css?v=11" />
  <link rel="stylesheet" href="/assets/slides.css" />
</head>
<body data-interaction="physarum">
  <header class="site-header">
    <a class="brand" href="/ja/">尾崎 勇介</a>
    <nav class="nav" aria-label="メインナビゲーション">
      <a href="/ja/">Home</a>
      <a href="/ja/experience/">職歴</a>
      <a href="/ja/education/">学歴</a>
      <a href="/ja/research/">研究</a>
      <a href="/ja/publications/">論文</a>
      <a href="/ja/projects/">Projects</a>
      <a href="/ja/awards/">受賞</a>
      <a class="active" href="/ja/slides/">発表資料</a>
      <a href="/ja/cv/">CV</a>
      <a href="/ja/blog/">ブログ</a>
      <span class="lang-switch" role="group" aria-label="Language / 言語">
        <a href="/slides/">EN</a>
        <a class="active" aria-current="page" href="/ja/slides/">日本語</a>
      </span>
    </nav>
  </header>

  <main class="page">
    <div class="page-head">
      <h1>発表資料・作品</h1>
      <span class="sub">公開中の資料です。非公開のものは直接リンクで共有しています。</span>
    </div>
    <div id="gallery" class="gallery"></div>
  </main>

  <script type="module">
    // The gallery data (manifest, viewer, thumbnails) lives under /slides/;
    // this Japanese page reuses it, only the surrounding text is localized.
    const BASE = "/slides/";
    const ICON = { slides: "📑", web: "🖥️", image: "🖼️", video: "🎬", audio: "🎧", file: "📦", project: "📁" };
    function esc(s) { return (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function asset(p) { return /^(https?:)?\//.test(p) ? p : BASE + p; }

    async function load() {
      const gallery = document.getElementById("gallery");
      let data;
      try {
        data = await (await fetch(BASE + "manifest.json", { cache: "no-store" })).json();
      } catch (_) {
        data = { artifacts: [] };
      }
      const items = (data.artifacts || []).filter((a) => a.listed !== false);
      if (!items.length) {
        gallery.outerHTML = `<div class="empty">公開中の資料はまだありません。</div>`;
        return;
      }
      gallery.innerHTML = items.map((a) => {
        const kind = a.kind || "file";
        const thumb = a.thumb
          ? `<img src="${esc(asset(a.thumb))}" alt="">`
          : `<span>${ICON[kind] || "📦"}</span>`;
        const lock = a.locked ? `<span class="lock" title="パスワードが必要です">🔒</span>` : "";
        return `
          <a class="card" href="${BASE}viewer.html?id=${encodeURIComponent(a.id)}">
            <div class="thumb">${lock}${thumb}</div>
            <div class="body">
              <span class="badge kind-${esc(kind)}">${esc(kind)}</span>
              <h3>${esc(a.title || a.id)}</h3>
              ${a.summary ? `<p class="summary">${esc(a.summary)}</p>` : ""}
              ${a.date ? `<p class="summary">${esc(a.date)}</p>` : ""}
            </div>
          </a>`;
      }).join("");
    }
    load();
  </script>
  <script src="/assets/interactions.js?v=11" defer></script>
</body>
</html>
